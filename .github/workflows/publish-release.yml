name: Publish Installer Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate release payload
        shell: bash
        run: |
          set -euo pipefail
          asset_name="AJ-Tools-${GITHUB_REF_NAME}.zip"
          test -f "releases/${asset_name}"
          test -f "releases/SHA256SUMS.txt"
          grep -F "  ${asset_name}" "releases/SHA256SUMS.txt" >/dev/null
          (
            cd releases
            sha256sum -c SHA256SUMS.txt
          )

      - name: Create or update GitHub release
        uses: softprops/action-gh-release@v2
        with:
          name: AJ Tools ${{ github.ref_name }}
          files: |
            releases/AJ-Tools-${{ github.ref_name }}.zip
            releases/SHA256SUMS.txt
          fail_on_unmatched_files: true
          generate_release_notes: false
