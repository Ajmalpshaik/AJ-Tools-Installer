name: Publish Installer Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract release notes
        id: changelog
        shell: bash
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME#v}"
          notes_file="$RUNNER_TEMP/release-notes.md"
          awk -v version="$version" '
            $0 ~ "^## \\[" version "\\] - " {
              capture=1
              split($0, parts, " - ")
              print "Released: " parts[2]
              print ""
              next
            }
            capture && /^## \[/ { exit }
            capture { print }
          ' CHANGELOG.md > "$notes_file"
          test -s "$notes_file"
          echo "notes_file=$notes_file" >> "$GITHUB_OUTPUT"

      - name: Validate release payload
        shell: bash
        run: |
          set -euo pipefail
          asset_name="AJ-Tools-${GITHUB_REF_NAME}.zip"
          test -f "releases/${asset_name}"
          test -f "releases/SHA256SUMS.txt"
          grep -F "  ${asset_name}" "releases/SHA256SUMS.txt" >/dev/null
          (
            cd releases
            sha256sum -c SHA256SUMS.txt
          )

      - name: Create or update GitHub release
        uses: softprops/action-gh-release@v2
        with:
          name: AJ Tools ${{ github.ref_name }}
          body_path: ${{ steps.changelog.outputs.notes_file }}
          files: |
            releases/AJ-Tools-${{ github.ref_name }}.zip
            releases/SHA256SUMS.txt
          fail_on_unmatched_files: true
          generate_release_notes: false
